# Example demonstrating GPU sharing with --consumable-shares=unlimited
# Since default memory consumption is 0, multiple pod replicas can claim and share the same GPU.
---
apiVersion: v1
kind: Namespace
metadata:
  name: gpu-share-unlimited
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: gpu-share-unlimited
  name: gpu-unlimited
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.nvidia.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: gpu-share-unlimited
  name: unlimited-sharing
  labels:
    app: unlimited-sharing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: unlimited-sharing
  template:
    metadata:
      labels:
        app: unlimited-sharing
    spec:
      resourceClaims:
      - name: gpu
        resourceClaimTemplateName: gpu-unlimited
      containers:
      - name: ctr
        image: ubuntu:22.04
        command: ["bash", "-c"]
        args: ["nvidia-smi -L; echo 'running with unlimited sharing'; sleep 3600"]
        resources:
          claims:
          - name: gpu
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
