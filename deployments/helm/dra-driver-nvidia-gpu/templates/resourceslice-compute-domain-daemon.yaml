{{- if .Values.resources.computeDomains.enabled }}
{{- $sharedDaemonRC := true }}
{{- if and .Values.featureGates (hasKey (.Values.featureGates | default dict) "SharedDaemonResourceClaim") }}
{{- $sharedDaemonRC = .Values.featureGates.SharedDaemonResourceClaim }}
{{- end }}
{{- if $sharedDaemonRC }}
---
apiVersion: {{ include "dra-driver-nvidia-gpu.resourceApiVersion" . }}
kind: ResourceSlice
metadata:
  name: compute-domain-daemons.nvidia.com
spec:
  driver: compute-domain.nvidia.com
  pool:
    name: compute-domain-daemons
    generation: 1
    resourceSliceCount: 1
  # Reachable only from nodes the kubelet plugin has labeled during channel
  # claim Prepare (i.e., nodes currently hosting a ComputeDomain). The label
  # value is the CD UID; we match the key's existence so the slice tracks all
  # such nodes regardless of which specific CD is on a given node.
  nodeSelector:
    nodeSelectorTerms:
    - matchExpressions:
      - key: resource.nvidia.com/computeDomain
        operator: Exists
  devices:
  # Device name must match the kubelet plugin's ComputeDomainDaemonInfo
  # canonical name ("daemon"; see
  # cmd/compute-domain-kubelet-plugin/deviceinfo.go). The kubelet plugin keys
  # its local allocatable map on this name when resolving Prepare()'s
  # result.Device.
  - name: daemon
    allowMultipleAllocations: true
    attributes:
      type:
        string: daemon
{{- end }}
{{- end }}
